apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-api
  namespace: vpn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpn-api
  template:
    metadata:
      labels:
        app: vpn-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: vpn-api
          image: ghcr.io/itzmegoldi/vpn-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: vpn-config
            - secretRef:
                name: vpn-secret
